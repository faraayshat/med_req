name: E2E (Vercel Deployments)

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL for E2E run"
        required: false
        type: string

concurrency:
  group: e2e-${{ github.event.deployment.id || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    if: >-
      (github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.target_url != '') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: ${{ github.event_name == 'deployment_status' && github.event.deployment_status.target_url || inputs.base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate base URL
        run: |
          if [[ -z "$E2E_BASE_URL" ]]; then
            echo "E2E_BASE_URL is empty."
            exit 1
          fi
          echo "Running E2E against: $E2E_BASE_URL"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
